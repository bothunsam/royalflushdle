<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROYAL FLUSHDLE</title>
  <style>
    :root {
      --bg-color: #052e16; /* Deep velvet casino table green */
      --felt-pattern: radial-gradient(circle, #15803d 0%, #052e16 100%);
      --neon-gold: #facc15;
      --card-bg: #ffffff;
      --card-selected: #e11d48; /* Hot neon red selector */
    }

    body {
      margin: 0;
      padding: 20px;
      background: var(--bg-color);
      background-image: var(--felt-pattern);
      color: #ffffff;
      font-family: 'Impact', 'Arial Black', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1 {
      margin: 0 0 5px 0;
      font-size: 3.5rem;
      text-align: center;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 0 10px var(--neon-gold), 0 0 20px #eab308, 0 0 40px #ca8a04;
      letter-spacing: 2px;
      animation: pulseGlow 2s infinite alternate;
    }

    @keyframes pulseGlow {
      from { text-shadow: 0 0 10px var(--neon-gold), 0 0 20px #eab308; }
      to { text-shadow: 0 0 20px var(--neon-gold), 0 0 40px #f8fafc, 0 0 60px #ca8a04; }
    }

    .subtitle {
      font-family: sans-serif;
      color: #bbf7d0;
      margin-bottom: 30px;
      text-align: center;
      max-width: 400px;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    /* Jackpot Style Stats Board */
    .stats-container {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }
    .stat-box {
      background: #000000;
      padding: 12px 25px;
      border-radius: 6px;
      border: 3px solid var(--neon-gold);
      box-shadow: 0 0 15px rgba(250,204,21,0.4);
      font-size: 1.3rem;
      color: var(--neon-gold);
      letter-spacing: 1px;
      text-align: center;
    }
    .stat-box span { color: #ffffff; font-family: monospace; font-size: 1.5rem; }

    /* Felt Table Display Grid */
    .hand-container {
      display: flex;
      gap: 15px;
      margin-bottom: 35px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 15px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 20px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
    }

    /* High Roller Cards */
    .card {
      width: 120px;
      height: 180px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s;
      border: 4px solid #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px;
      box-sizing: border-box;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
    }

    .card.selected {
      border-color: var(--card-selected);
      box-shadow: 0 0 25px var(--card-selected), 0 0 10px #f43f5e;
      transform: translateY(-15px) rotate(-3deg);
    }

    .card-suit-main { align-self: center; width: 50px; height: 50px; }
    .card-corner {
      font-family: Arial, sans-serif;
      font-size: 1.6rem;
      font-weight: bold;
      line-height: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card-corner div { width: 18px; height: 18px; margin-top: 2px; }

    .card.red { color: #dc2626; }
    .card.black { color: #111827; }

    /* Action Buttons */
    .btn {
      background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%);
      color: white;
      border: 2px solid #fecdd3;
      padding: 16px 36px;
      font-size: 1.4rem;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 0 #7f1d1d, 0 15px 20px rgba(0,0,0,0.4);
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s, visibility 0.2s;
      opacity: 0;
      visibility: hidden;
    }
    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #7f1d1d, 0 8px 10px rgba(0,0,0,0.4);
    }

    /* Jackpot Overlay System */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal {
      background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
      border: 5px solid var(--neon-gold);
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 0 50px rgba(250,204,21,0.6);
      animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes modalPop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal h2 { font-size: 3rem; color: #ffffff; text-shadow: 0 0 10px var(--neon-gold); margin: 0; }

    .tier-godlike { color: #f43f5e; text-shadow: 0 0 15px #f43f5e; font-size: 1.8rem; }
    .tier-expert { color: #22c55e; text-shadow: 0 0 15px #22c55e; font-size: 1.8rem; }
    .tier-pro { color: #eab308; text-shadow: 0 0 15px #eab308; font-size: 1.8rem; }
    .tier-survivor { color: #a855f7; text-shadow: 0 0 15px #a855f7; font-size: 1.8rem; }

    /* Coin Storm Particles */
    .coin {
      position: fixed;
      width: 25px;
      height: 25px;
      background: var(--neon-gold);
      border-radius: 50%;
      border: 2px dashed #ca8a04;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      pointer-events: none;
      z-index: 100;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>ROYAL FLUSHDLE</h1>
  <p class="subtitle">Discard unwanted cards. How many draws until you get a ROYAL FLUSH?</p>

  <div class="stats-container">
    <div class="stat-box">DRAWS: <span id="draw-count">0</span></div>
    <div class="stat-box">DECK: <span id="deck-count">47</span></div>
  </div>

  <div class="hand-container" id="hand-display"></div>

  <button class="btn" id="draw-btn" onclick="executeDraw()">Discard & Draw</button>

  <div class="overlay" id="win-overlay">
    <div class="modal">
      <h2>ROYAL FLUSH!!!!</h2>
      <p style="color: #cbd5e1; font-family: sans-serif;"></p>
      <div id="tier-title" style="margin-top: 15px;"></div>
      <h3 style="font-size: 3rem; margin: 15px 0; color: var(--neon-gold); text-shadow: 0 0 10px rgba(250,204,21,0.5);" id="final-score">0 Draws</h3>
      <button class="btn" style="opacity:1; visibility:visible; display:inline-block;" onclick="shareScore()">Share Result</button>
      
      <div style="margin-top: 25px; color: #94a3b8; font-size: 0.85rem; font-family: sans-serif; letter-spacing: 1px;">
        NEXT DECK IN:
        <span id="countdown" style="font-family: monospace; font-weight: bold; color: var(--neon-gold); font-size: 1.3rem; display: block; margin-top: 5px;">00:00:00</span>
      </div>
    </div>
  </div>

  <script>
   // --- Vector SVG Graphics Definitions ---
    const SVG_SUITS = {
      "♠": `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block; width:100%; height:100%;"><path d="M12 2C9 6.5 5 8.5 5 13c0 3.5 2.5 6 6 6 .5 0 1 0 1-.5V22h-3v1h8v-1h-3v-3.5c0 .5.5.5 1 .5 3.5 0 6-2.5 6-6 0-4.5-4-6.5-7-11z"/></svg>`,
      "♥": `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block; width:100%; height:100%;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
      "♦": `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block; width:100%; height:100%;"><path d="M12 2L2 12l10 10 10-10L12 2z"/></svg>`,
      "♣": `<svg viewBox="0 0 24 24" fill="currentColor" style="display:block; width:100%; height:100%;"><path d="M12 2a3.5 3.5 0 0 1 3.5 3.5c0 1.23-.63 2.3-1.6 2.92a3.5 3.5 0 0 1 4.6 3.33 3.5 3.5 0 0 1-3.5 3.5H13v3.5h2.5v1h-6v-1H11v-3.5H9a3.5 3.5 0 0 1-3.5-3.5 3.5 3.5 0 0 1 4.6-3.33 3.5 3.5 0 0 1-1.6-2.92A3.5 3.5 0 0 1 12 2z"/></svg>`
    };

    const SUITS = ["♠", "♥", "♦", "♣"];
    const VALUES = [
      { name: "2", value: 2 }, { name: "3", value: 3 }, { name: "4", value: 4 },
      { name: "5", value: 5 }, { name: "6", value: 6 }, { name: "7", value: 7 },
      { name: "8", value: 8 }, { name: "9", value: 9 }, { name: "10", value: 10 },
      { name: "J", value: 11 }, { name: "Q", value: 12 }, { name: "K", value: 13 },
      { name: "A", value: 14 }
    ];

    const TIERS = [
      { maxDraws: 8,   name: "INSANE", class: "tier-godlike",  emoji: "🟥🟥🟥" },
      { maxDraws: 15,  name: "Great!",  class: "tier-expert",   emoji: "🟩🟩🟩" },
      { maxDraws: 30,  name: "average",       class: "tier-pro",      emoji: "🟨🟨🟨" },
      { maxDraws: Infinity, name: "extremely bad",  class: "tier-survivor", emoji: "🟪🟪🟪" }
    ];

    let gameState = { hand: [], deck: [], drawCount: 0, selectedIndices: new Set(), isGameOver: false };

    function seededRandom(seed) {
      return function() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      }
    }

    function getDailySeed() {
      const today = new Date();
      const dateString = `${today.getFullYear()}${today.getMonth() + 1}${today.getDate()}`;
      let hash = 0;
      for (let i = 0; i < dateString.length; i++) {
        hash = dateString.charCodeAt(i) + ((hash << 5) - hash);
      }
      return Math.abs(hash);
    }

    function createDeck() {
      let deck = [];
      for (let suit of SUITS) {
        for (let val of VALUES) {
          deck.push({ name: val.name, value: val.value, suit: suit });
        }
      }
      return deck;
    }

    function shuffle(deck, randomFn) {
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(randomFn() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      return deck;
    }

    function evaluateHand(hand) {
      if (!hand || hand.length !== 5) return "Evaluating...";
      const sorted = [...hand].sort((a, b) => a.value - b.value);
      const values = sorted.map(c => c.value);
      const suits = sorted.map(c => c.suit);

      const isFlush = suits.every(s => s === suits[0]);
      const isStraight = values.every((v, i) => i === 0 || v === values[i - 1] + 1);

      if (isFlush && isStraight && values[0] === 10) return "Royal Flush";
      return "Playing...";
    }

    function getActiveTier(draws) {
      return TIERS.find(tier => draws <= tier.maxDraws);
    }

    function saveProgress() {
      const todayStr = new Date().toDateString();
      const saveData = { date: todayStr, draws: gameState.drawCount, hand: gameState.hand, deck: gameState.deck, completed: gameState.isGameOver };
      localStorage.setItem("daily_poker_v4", JSON.stringify(saveData));
    }

    function loadProgress() {
      const saved = localStorage.getItem("daily_poker_v4");
      if (!saved) return null;
      const parsed = JSON.parse(saved);
      return parsed.date === new Date().toDateString() ? parsed : null;
    }

    function initGame() {
      const savedData = loadProgress();
      if (savedData && savedData.hand && savedData.hand.length === 5) {
        gameState.hand = savedData.hand;
        gameState.deck = savedData.deck;
        gameState.drawCount = savedData.draws;
        gameState.isGameOver = savedData.completed;
      } else {
        const seed = getDailySeed();
        const dailyRng = seededRandom(seed);
        let freshDeck = createDeck();
        freshDeck = shuffle(freshDeck, dailyRng);
        
        gameState.hand = freshDeck.splice(0, 5);
        gameState.deck = shuffle(freshDeck, () => Math.random());
        gameState.drawCount = 0;
        gameState.isGameOver = false;
        saveProgress();
      }

      renderUI();
      if (gameState.isGameOver) triggerWin();
    }

    function renderUI() {
      document.getElementById("draw-count").innerText = gameState.drawCount;
      document.getElementById("deck-count").innerText = gameState.deck.length;

      const container = document.getElementById("hand-display");
      container.innerHTML = "";

      gameState.hand.forEach((card, index) => {
        const isRed = card.suit === "♥" || card.suit === "♦";
        const cardEl = document.createElement("div");
        cardEl.className = `card ${isRed ? 'red' : 'black'} ${gameState.selectedIndices.has(index) ? 'selected' : ''}`;
        
        cardEl.innerHTML = `
          <div class="card-corner top">
            <span>${card.name}</span>
            <div>${SVG_SUITS[card.suit]}</div>
          </div>
          <div class="card-suit-main">${SVG_SUITS[card.suit]}</div>
          <div class="card-corner bottom" style="transform: rotate(180deg);">
            <span>${card.name}</span>
            <div>${SVG_SUITS[card.suit]}</div>
          </div>
        `;

        cardEl.onclick = () => toggleCardSelection(index);
        container.appendChild(cardEl);
      });

      const drawBtn = document.getElementById("draw-btn");
      if (gameState.selectedIndices.size > 0) {
        drawBtn.style.opacity = "1";
        drawBtn.style.visibility = "visible";
      } else {
        drawBtn.style.opacity = "0";
        drawBtn.style.visibility = "hidden";
      }

      if (gameState.isGameOver) drawBtn.disabled = true;
    }

    function toggleCardSelection(index) {
      if (gameState.isGameOver) return;
      if (gameState.selectedIndices.has(index)) {
        gameState.selectedIndices.delete(index);
      } else {
        gameState.selectedIndices.add(index);
      }
      renderUI();
    }

    function executeDraw() {
      if (gameState.isGameOver) return;

      gameState.selectedIndices.forEach(index => {
        if (gameState.deck.length > 0) {
          gameState.hand[index] = gameState.deck.shift();
        }
      });

      gameState.drawCount++;
      gameState.selectedIndices.clear();

      if (evaluateHand(gameState.hand) === "Royal Flush") {
        gameState.isGameOver = true;
        triggerWin();
      }

      saveProgress();
      renderUI();
    }

    function triggerWin() {
      const currentTier = getActiveTier(gameState.drawCount);
      document.getElementById("final-score").innerText = `${gameState.drawCount} Draws`;
      
      const titleEl = document.getElementById("tier-title");
      titleEl.innerText = currentTier.name;
      titleEl.className = currentTier.class;
      
      document.getElementById("win-overlay").style.display = "flex";
      startCountdown();
      coinStorm(); // Trigger animated visual reward loop
    }

    // --- Dynamic Particle Coin Cascade ---
    function coinStorm() {
      const duration = 4000;
      const end = Date.now() + duration;

      const interval = setInterval(() => {
        if (Date.now() > end) return clearInterval(interval);

        const coin = document.createElement("div");
        coin.className = "coin";
        coin.style.left = Math.random() * window.innerWidth + "px";
        coin.style.animationDuration = (Math.random() * 2 + 1) + "s";
        document.body.appendChild(coin);

        setTimeout(() => coin.remove(), 3000);
      }, 40);
    }

    function startCountdown() {
      const countdownEl = document.getElementById("countdown");
      function updateTimer() {
        const now = new Date();
        const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
        const diff = midnight - now;

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
        const pad = (num) => String(num).padStart(2, "0");

        countdownEl.innerText = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      }
      updateTimer();
      setInterval(updateTimer, 1000);
    }

    function shareScore() {
      const today = new Date().toLocaleDateString();
      const currentTier = getActiveTier(gameState.drawCount);
      const shareText = `🎰 ROYAL FLUSHDLE(${today}) 🎰\n` +
                        `Rank: ${currentTier.name}\n` +
                        `Score: ${gameState.drawCount} draws\n` +
                        ``;
      navigator.clipboard.writeText(shareText).then(() => {
        alert("Stats copied to clipboard!");
      });
    }

    // --- Keyboard Shortcut Dev Reset Tool ---
    window.addEventListener("keydown", (event) => {
      if (event.key.toLowerCase() === "r") {
        localStorage.removeItem("daily_poker_v4");
        location.reload();
      }
    });

    window.onload = initGame;
     // --- Keyboard Shortcut Dev Tools Hook ---
    window.addEventListener("keydown", (event) => {
      // Check if the pressed key is "r" or "R"
      if (event.key.toLowerCase() === "r") {
        console.log("🔧 Dev Shortcut Triggered: Wiping local cache and reloading...");
        
        // Wipe the current daily save session key
        localStorage.removeItem("daily_poker_v4");
        
        // Instantly reload the page to deal fresh random configurations
        location.reload();
      }
    });
  </script>
</body>
</html>
